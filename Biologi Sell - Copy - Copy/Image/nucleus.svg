<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <filter id="blur-nucleus">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" />
    </filter>
    <image id="bgImage-nucleus" xlink:href="FotoUm.webp" width="200" height="200" preserveAspectRatio="xMidYMid slice"/>
    <pattern id="bgPattern-nucleus" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <use xlink:href="#bgImage-nucleus"/>
    </pattern>
    <mask id="roundMask-nucleus">
      <rect x="0" y="0" width="200" height="200" fill="white" rx="30" ry="30"/>
    </mask>
  </defs>
  <!-- Background with rounded corners -->
  <rect x="0" y="0" width="200" height="200" fill="url(#bgPattern-nucleus)" rx="30" ry="30" mask="url(#roundMask-nucleus)"/>
  <!-- Nucleus outer membrane (nuclear envelope) -->
  <circle cx="100" cy="100" r="80" fill="#9370DB" stroke="#4B0082" stroke-width="3" opacity="0.8"/>
  <!-- Nuclear pores -->
  <circle cx="50" cy="70" r="5" fill="#E6E6FA" stroke="#4B0082" stroke-width="1" opacity="0.9"/>
  <circle cx="150" cy="75" r="5" fill="#E6E6FA" stroke="#4B0082" stroke-width="1" opacity="0.9"/>
  <circle cx="45" cy="130" r="5" fill="#E6E6FA" stroke="#4B0082" stroke-width="1" opacity="0.9"/>
  <circle cx="155" cy="125" r="5" fill="#E6E6FA" stroke="#4B0082" stroke-width="1" opacity="0.9"/>
  <!-- Nucleoplasm -->
  <circle cx="100" cy="100" r="70" fill="#DDA0DD" opacity="0.7"/>
  <!-- Nucleolus -->
  <circle cx="100" cy="100" r="30" fill="#FFB6C1" stroke="#FF69B4" stroke-width="2" opacity="0.8"/>
  <!-- Chromatin -->
  <path d="M 65 75 Q 75 85, 65 95" fill="none" stroke="#8B008B" stroke-width="2" opacity="0.7"/>
  <path d="M 135 80 Q 125 95, 135 105" fill="none" stroke="#8B008B" stroke-width="2" opacity="0.7"/>
  <path d="M 80 125 Q 95 120, 110 130" fill="none" stroke="#8B008B" stroke-width="2" opacity="0.7"/>
</svg>