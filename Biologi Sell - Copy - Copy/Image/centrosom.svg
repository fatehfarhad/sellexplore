<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <filter id="blur-centro">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" />
    </filter>
    <image id="bgImage-centro" xlink:href="FotoUm.webp" width="200" height="200" preserveAspectRatio="xMidYMid slice"/>
    <pattern id="bgPattern-centro" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <use xlink:href="#bgImage-centro"/>
    </pattern>
    <mask id="roundMask-centro">
      <rect x="0" y="0" width="200" height="200" fill="white" rx="30" ry="30"/>
    </mask>
  </defs>
  <!-- Background with rounded corners -->
  <rect x="0" y="0" width="200" height="200" fill="url(#bgPattern-centro)" rx="30" ry="30" mask="url(#roundMask-centro)"/>
  <!-- Centrosome/Centriole pair -->
  <!-- Pericentriolar material -->
  <circle cx="100" cy="100" r="50" fill="#DDA0DD" stroke="#9932CC" stroke-width="2" opacity="0.6"/>
  
  <!-- Centriole 1 (vertical) -->
  <g transform="translate(85, 100)" opacity="0.85">
    <rect x="-8" y="-30" width="16" height="60" fill="none" stroke="#8B008B" stroke-width="2" rx="2"/>
    <circle cx="-6" cy="-20" r="3" fill="#8B008B"/>
    <circle cx="6" cy="-20" r="3" fill="#8B008B"/>
    <circle cx="-6" cy="-5" r="3" fill="#8B008B"/>
    <circle cx="6" cy="-5" r="3" fill="#8B008B"/>
    <circle cx="-6" cy="10" r="3" fill="#8B008B"/>
    <circle cx="6" cy="10" r="3" fill="#8B008B"/>
  </g>
  
  <!-- Centriole 2 (horizontal) -->
  <g transform="translate(100, 115)" opacity="0.85">
    <rect x="-30" y="-8" width="60" height="16" fill="none" stroke="#BA55D3" stroke-width="2" rx="2"/>
    <circle cx="-20" cy="-6" r="3" fill="#BA55D3"/>
    <circle cx="-20" cy="6" r="3" fill="#BA55D3"/>
    <circle cx="-5" cy="-6" r="3" fill="#BA55D3"/>
    <circle cx="-5" cy="6" r="3" fill="#BA55D3"/>
    <circle cx="10" cy="-6" r="3" fill="#BA55D3"/>
    <circle cx="10" cy="6" r="3" fill="#BA55D3"/>
  </g>
  
  <!-- Microtubules radiating -->
  <line x1="100" y1="50" x2="100" y2="20" stroke="#FFD700" stroke-width="2" opacity="0.7"/>
  <line x1="135" y1="75" x2="160" y2="50" stroke="#FFD700" stroke-width="2" opacity="0.7"/>
  <line x1="100" y1="150" x2="100" y2="180" stroke="#FFD700" stroke-width="2" opacity="0.7"/>
  <line x1="65" y1="75" x2="40" y2="50" stroke="#FFD700" stroke-width="2" opacity="0.7"/>
</svg>