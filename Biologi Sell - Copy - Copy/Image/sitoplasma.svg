<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <filter id="blur-sito">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" />
    </filter>
    <image id="bgImage-sito" xlink:href="FotoUm.webp" width="200" height="200" preserveAspectRatio="xMidYMid slice"/>
    <pattern id="bgPattern-sito" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <use xlink:href="#bgImage-sito"/>
    </pattern>
    <mask id="roundMask-sito">
      <rect x="0" y="0" width="200" height="200" fill="white" rx="30" ry="30"/>
    </mask>
  </defs>
  <!-- Background with rounded corners -->
  <rect x="0" y="0" width="200" height="200" fill="url(#bgPattern-sito)" rx="30" ry="30" mask="url(#roundMask-sito)"/>
  <!-- Cytoplasm with organelles -->
  <!-- Main cytoplasm background -->
  <rect x="0" y="0" width="200" height="200" fill="#F0E68C" opacity="0.6"/>
  
  <!-- Various organelles within cytoplasm -->
  <!-- Mitochondria -->
  <ellipse cx="50" cy="50" rx="20" ry="25" fill="#FF6B6B" stroke="#C92A2A" stroke-width="1.5" opacity="0.8"/>
  
  <!-- Ribosome -->
  <circle cx="150" cy="60" r="15" fill="#FF8C00" stroke="#8B4513" stroke-width="1.5" opacity="0.8"/>
  
  <!-- Vesicle -->
  <circle cx="70" cy="130" r="18" fill="#FF69B4" stroke="#FF1493" stroke-width="1.5" opacity="0.8"/>
  
  <!-- ER/Tubule -->
  <path d="M 30 160 Q 80 150, 120 165" fill="none" stroke="#DC143C" stroke-width="2.5" opacity="0.8"/>
  
  <!-- Peroxisome -->
  <circle cx="140" cy="130" r="15" fill="#87CEEB" stroke="#4682B4" stroke-width="1.5" opacity="0.8"/>
  
  <!-- Protein molecules -->
  <circle cx="100" cy="80" r="5" fill="#FFD700" stroke="#DAA520" stroke-width="1" opacity="0.7"/>
  <circle cx="110" cy="95" r="5" fill="#FFD700" stroke="#DAA520" stroke-width="1" opacity="0.7"/>
  <circle cx="60" cy="100" r="5" fill="#FFD700" stroke="#DAA520" stroke-width="1" opacity="0.7"/>
  <circle cx="130" cy="100" r="5" fill="#FFD700" stroke="#DAA520" stroke-width="1" opacity="0.7"/>
  
  <!-- Water molecules (small dots) -->
  <circle cx="45" cy="90" r="2" fill="#00CED1" opacity="0.6"/>
  <circle cx="85" cy="110" r="2" fill="#00CED1" opacity="0.6"/>
  <circle cx="125" cy="80" r="2" fill="#00CED1" opacity="0.6"/>
  <circle cx="160" cy="90" r="2" fill="#00CED1" opacity="0.6"/>
  
  <!-- Label -->
  <text x="100" y="195" font-size="12" text-anchor="middle" fill="#666" opacity="0.8">Sitoplasma</text>
</svg>