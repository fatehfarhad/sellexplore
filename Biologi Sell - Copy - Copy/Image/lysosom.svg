<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <filter id="blur-lyso">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" />
    </filter>
    <image id="bgImage-lyso" xlink:href="FotoUm.webp" width="200" height="200" preserveAspectRatio="xMidYMid slice"/>
    <pattern id="bgPattern-lyso" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <use xlink:href="#bgImage-lyso"/>
    </pattern>
    <mask id="roundMask-lyso">
      <rect x="0" y="0" width="200" height="200" fill="white" rx="30" ry="30"/>
    </mask>
  </defs>
  <!-- Background with rounded corners -->
  <rect x="0" y="0" width="200" height="200" fill="url(#bgPattern-lyso)" rx="30" ry="30" mask="url(#roundMask-lyso)"/>
  <!-- Lysosome -->
  <!-- Main lysosome body -->
  <circle cx="100" cy="100" r="60" fill="#FF4500" stroke="#8B2500" stroke-width="2" opacity="0.85"/>
  <circle cx="100" cy="100" r="55" fill="#FF6347" opacity="0.7"/>
  
  <!-- Digestive enzymes (represented as granules) -->
  <circle cx="75" cy="75" r="8" fill="#FFD700" stroke="#DAA520" stroke-width="1" opacity="0.8"/>
  <circle cx="125" cy="80" r="8" fill="#FFD700" stroke="#DAA520" stroke-width="1" opacity="0.8"/>
  <circle cx="85" cy="115" r="8" fill="#FFD700" stroke="#DAA520" stroke-width="1" opacity="0.8"/>
  <circle cx="115" cy="125" r="8" fill="#FFD700" stroke="#DAA520" stroke-width="1" opacity="0.8"/>
  <circle cx="100" cy="140" r="7" fill="#FFD700" stroke="#DAA520" stroke-width="1" opacity="0.8"/>
  <circle cx="95" cy="90" r="7" fill="#FFD700" stroke="#DAA520" stroke-width="1" opacity="0.8"/>
  
  <!-- Degradation indicator -->
  <text x="100" y="105" font-size="30" text-anchor="middle" fill="#FFF" opacity="0.85">⚗️</text>
</svg>